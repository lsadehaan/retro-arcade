# Fabrica deployment spec for retro-arcade
# Source of truth. Fabrica reads this file on every deploy.
# Secrets never live here — they live in Windmill vault under f/deploy/<project>/<env>/.
#
# The staging server below is the live one that was originally provisioned by
# Superiority and now runs production traffic. Fabrica will adopt it in place:
# look it up by name, rsync the repo, restart via systemd. The server name
# preserves its original Superiority-era suffix so the lookup matches.

version: 1

environments:
  staging:
    provider: hetzner
    server:
      name: staging-retro-arcade-40d01262
      type: cx23
      image: ubuntu-24.04
      location: fsn1
      user: root
      ssh_keys:
        - a.dehaan@cerebrosphere.com
        - agent-host
    runtime:
      node_version: "20"
      build:
        - npm ci --omit=dev
      start: node src/server.js
      port: 3000
      env_file: .env.production
    networking:
      domain: staging-retro-arcade.freigen.com
      health_check:
        path: /
        expected_status: 200
        timeout_seconds: 10
    strategy: in_place
