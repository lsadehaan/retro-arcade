<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Retro Arcade</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">RETRO ARCADE</a>
    <div class="navbar-links">
      <a href="/leaderboard.html">Leaderboard</a>
      <span id="nav-auth-links" style="display:flex;gap:20px;">
        <a href="/auth/login.html">Login</a>
        <a href="/auth/register.html">Register</a>
      </span>
      <span id="nav-user-info" style="display:none;align-items:center;gap:12px;">
        <span class="navbar-user" id="nav-username"></span>
        <a href="#" id="nav-logout-btn">Logout</a>
      </span>
    </div>
  </nav>

  <!-- Register Form -->
  <div class="form-container">
    <h2>REGISTER</h2>
    <form id="register-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               pattern="[a-zA-Z0-9]{3,20}" title="3-20 alphanumeric characters" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password"
               minlength="8" maxlength="72" required />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password"
               autocomplete="new-password" required />
      </div>
      <div class="form-error" id="form-error"></div>
      <button type="submit" class="btn btn-pink" style="width:100%;margin-top:8px;">REGISTER</button>
    </form>
    <div class="form-footer">
      Already have an account? <a href="/auth/login.html">Login</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('register-form');
      const errorEl = document.getElementById('form-error');

      // Logout handler
      const logoutBtn = document.getElementById('nav-logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
          e.preventDefault();
          api.logout();
        });
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (!username || !password) {
          errorEl.textContent = 'Username and password are required.';
          return;
        }

        if (password !== confirmPassword) {
          errorEl.textContent = 'Passwords do not match.';
          return;
        }

        if (password.length < 8) {
          errorEl.textContent = 'Password must be at least 8 characters.';
          return;
        }

        try {
          const res = await api.post('/api/auth/register', { username, password });
          if (!res) return;

          if (res.ok) {
            api.clearCache();
            window.location.href = '/';
          } else {
            const data = await res.json();
            errorEl.textContent = data.error || 'Registration failed.';
          }
        } catch {
          errorEl.textContent = 'Network error. Please try again.';
        }
      });
    });
  </script>
</body>
</html>
