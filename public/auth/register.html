<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Retro Arcade</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .field-error { color: #ff4444; font-size: 0.7rem; margin-top: 4px; display: block; min-height: 1em; }
    .input-error { border-color: #ff4444 !important; box-shadow: 0 0 8px rgba(255,68,68,0.15) !important; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">RETRO ARCADE</a>
    <div class="navbar-links">
      <a href="/leaderboard.html">Leaderboard</a>
      <span id="nav-auth-links" style="display:flex;gap:20px;">
        <a href="/auth/login.html">Login</a>
        <a href="/auth/register.html">Register</a>
      </span>
      <span id="nav-user-info" style="display:none;align-items:center;gap:12px;">
        <span class="navbar-user" id="nav-username"></span>
        <a href="#" id="nav-logout-btn">Logout</a>
      </span>
    </div>
  </nav>

  <!-- Register Form -->
  <div class="form-container">
    <h2>REGISTER</h2>
    <form id="register-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               pattern="[a-zA-Z0-9]{3,20}" title="3-20 alphanumeric characters" required />
        <span class="field-error" id="username-error"></span>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password"
               minlength="8" maxlength="72" required />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password"
               autocomplete="new-password" required />
      </div>
      <div class="form-error" id="form-error"></div>
      <button type="submit" class="btn btn-pink" style="width:100%;margin-top:8px;">REGISTER</button>
    </form>
    <div class="form-footer">
      Already have an account? <a href="/auth/login.html">Login</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('register-form');
      const errorEl = document.getElementById('form-error');
      const usernameInput = document.getElementById('username');
      const usernameError = document.getElementById('username-error');

      function validateUsername(value) {
        if (!value) return 'Username is required';
        if (value.length < 3) return 'Username must be at least 3 characters';
        if (value.length > 20) return 'Username must be at most 20 characters';
        if (!/^[a-zA-Z0-9]+$/.test(value)) return 'Username can only contain letters and numbers';
        return '';
      }

      function showUsernameError(msg) {
        usernameError.textContent = msg;
        if (msg) {
          usernameInput.classList.add('input-error');
        } else {
          usernameInput.classList.remove('input-error');
        }
      }

      usernameInput.addEventListener('input', () => {
        const msg = validateUsername(usernameInput.value.trim());
        showUsernameError(msg);
      });

      usernameInput.addEventListener('blur', () => {
        const msg = validateUsername(usernameInput.value.trim());
        showUsernameError(msg);
      });

      // Logout handler
      const logoutBtn = document.getElementById('nav-logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
          e.preventDefault();
          api.logout();
        });
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';

        const username = usernameInput.value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        const usernameMsg = validateUsername(username);
        if (usernameMsg) {
          showUsernameError(usernameMsg);
          return;
        }

        if (!password) {
          errorEl.textContent = 'Password is required.';
          return;
        }

        if (password !== confirmPassword) {
          errorEl.textContent = 'Passwords do not match.';
          return;
        }

        if (password.length < 8) {
          errorEl.textContent = 'Password must be at least 8 characters.';
          return;
        }

        try {
          const res = await api.post('/api/auth/register', { username, password });
          if (!res) return;

          if (res.ok) {
            api.clearCache();
            window.location.href = '/';
          } else {
            const data = await res.json();
            errorEl.textContent = data.error || 'Registration failed.';
          }
        } catch {
          errorEl.textContent = 'Network error. Please try again.';
        }
      });
    });
  </script>
</body>
</html>
