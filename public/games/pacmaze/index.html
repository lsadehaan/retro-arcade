<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pac-Maze Rush — Retro Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 10px;
    }
    h1 {
      color: #FFD700;
      font-size: 2rem;
      letter-spacing: 0.15em;
      margin-bottom: 6px;
      text-shadow: 0 0 10px #FFD700;
    }
    #hud {
      display: flex;
      gap: 30px;
      margin-bottom: 8px;
      font-size: 1rem;
      color: #fff;
    }
    #hud span { color: #FFD700; }
    #canvas-wrap {
      position: relative;
    }
    canvas {
      display: block;
      border: 2px solid #1a1aff;
      box-shadow: 0 0 20px #1a1aff88;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #overlay h2 { font-size: 2rem; color: #FFD700; }
    #overlay p  { font-size: 1rem; color: #ccc; text-align: center; max-width: 340px; }
    #overlay button {
      background: #1a1aff;
      color: #fff;
      border: none;
      padding: 10px 28px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 0.1em;
    }
    #overlay button:hover { background: #3333ff; }
    #item-legend {
      display: flex;
      gap: 18px;
      margin-top: 6px;
      font-size: 0.78rem;
      color: #aaa;
    }
    #item-legend span { color: #fff; }
  </style>
</head>
<body>
  <h1>PAC-MAZE RUSH</h1>
  <div id="hud">
    <div>SCORE: <span id="score-display">0</span></div>
    <div>LIVES: <span id="lives-display">3</span></div>
    <div>LEVEL: <span id="level-display">1</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="overlay">
      <h2>PAC-MAZE RUSH</h2>
      <p>Arrow keys or WASD to move. Eat all dots to advance!<br>Power pellets let you eat ghosts!</p>
      <div id="item-legend">
        <div>&#10052; Freeze ghosts 5s</div>
        <div>&#11088; Score Bomb 2x 10s</div>
        <div>&#127744; Warp Berry (teleport)</div>
      </div>
      <button id="start-btn">START GAME</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
