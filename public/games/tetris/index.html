<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Neon Stack — Retro Arcade</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .game-layout {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      flex-wrap: wrap;
    }
    .game-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
      max-width: 100%;
      overflow: hidden;
    }
    .game-main h1 {
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-shadow: 0 0 10px #ff8800, 0 0 20px #ff8800;
      margin-bottom: 0.4rem;
      color: #ff8800;
      word-break: break-word;
      overflow-wrap: break-word;
      text-align: center;
    }
    #hud {
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 6px #0ff;
      color: #0ff;
      flex-wrap: wrap;
      justify-content: center;
    }
    #canvas-wrapper { position: relative; max-width: 100%; }
    canvas {
      display: block;
      border: 2px solid #ff8800;
      box-shadow: 0 0 20px #ff8800, 0 0 40px #cc6600;
      max-width: 100%;
      height: auto;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      color: #ff8800;
      gap: 0.8rem;
    }
    #overlay h2 {
      font-size: 1.8rem;
      text-shadow: 0 0 10px #ff8800;
      letter-spacing: 0.2em;
      font-family: var(--font-pixel);
      word-break: break-word;
      overflow-wrap: break-word;
      text-align: center;
      max-width: 90%;
    }
    #overlay p {
      font-size: 0.95rem;
      opacity: 0.85;
      text-align: center;
      max-width: 380px;
      line-height: 1.6;
    }
    #overlay button {
      background: transparent;
      border: 2px solid #ff8800;
      color: #ff8800;
      font-family: inherit;
      font-size: 1.1rem;
      padding: 0.5rem 2rem;
      cursor: pointer;
      text-shadow: 0 0 6px #ff8800;
      box-shadow: 0 0 10px #ff8800;
      letter-spacing: 0.1em;
    }
    #overlay button:hover { background: rgba(255,136,0,0.1); }

    /* Leaderboard panel */
    .game-leaderboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      min-width: 220px;
      max-width: 280px;
    }
    .game-leaderboard h3 {
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      color: var(--neon-gold);
      text-shadow: 0 0 6px rgba(255,215,0,0.4);
      margin-bottom: 12px;
      text-align: center;
    }
    .lb-list { list-style: none; font-size: 0.8rem; }
    .lb-list li {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .lb-list li:last-child { border-bottom: none; }
    .lb-rank { color: var(--neon-cyan); min-width: 28px; }
    .lb-name { flex: 1; margin: 0 8px; }
    .lb-score { color: var(--neon-green); font-family: var(--font-mono); }
    /* Difficulty selector */
    #difficulty-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }
    .diff-btn {
      font-family: var(--font-pixel);
      font-size: 0.45rem;
      padding: 6px 14px;
      border: 2px solid #555;
      background: transparent;
      color: #888;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .diff-btn:hover {
      border-color: #aaa;
      color: #ccc;
    }
    .diff-btn.diff-active {
      border-color: currentColor;
      text-shadow: 0 0 6px currentColor;
      box-shadow: 0 0 8px currentColor;
    }
    .diff-btn[data-difficulty="easy"].diff-active {
      color: #39ff14;
      border-color: #39ff14;
    }
    .diff-btn[data-difficulty="normal"].diff-active {
      color: #ffff00;
      border-color: #ffff00;
    }
    .diff-btn[data-difficulty="hard"].diff-active {
      color: #ff3333;
      border-color: #ff3333;
    }

    /* Difficulty tags in leaderboard */
    .lb-diff {
      font-family: var(--font-pixel);
      font-size: 0.35rem;
      margin-left: 6px;
      padding: 1px 4px;
      border-radius: 2px;
      text-transform: uppercase;
    }
    .lb-diff-easy { color: #39ff14; }
    .lb-diff-normal { color: #ffff00; }
    .lb-diff-hard { color: #ff3333; }
    .lb-empty { color: #555; font-size: 0.75rem; text-align: center; padding: 12px 0; }

    @media (max-width: 900px) {
      .game-layout { flex-direction: column; align-items: center; }
      .game-leaderboard { max-width: 100%; min-width: 280px; }
    }
    @media (max-width: 480px) {
      #hud {
        font-size: 0.7rem;
        gap: 0.4rem 0.8rem;
      }
      #overlay {
        overflow-y: auto;
        gap: 0.4rem;
        padding: 0.5rem;
      }
      #overlay h2 {
        font-size: 1.1rem;
        letter-spacing: 0.1em;
      }
      #overlay p {
        font-size: 0.7rem;
        max-width: 95%;
        line-height: 1.3;
      }
      #overlay button {
        font-size: 0.85rem;
        padding: 0.35rem 1.2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">RETRO ARCADE</a>
    <div class="navbar-links">
      <a href="/leaderboard.html">Leaderboard</a>
      <span id="nav-auth-links" style="display:flex;gap:20px;">
        <a href="/auth/login.html">Login</a>
        <a href="/auth/register.html">Register</a>
      </span>
      <span id="nav-user-info" style="display:none;align-items:center;gap:12px;">
        <span class="navbar-user" id="nav-username"></span>
        <a href="#" id="nav-logout-btn">Logout</a>
      </span>
    </div>
  </nav>
  <div class="settings-bar">
    <button class="settings-btn" id="sound-toggle">SFX: ON</button>
    <button class="settings-btn" id="theme-toggle">THEME: NEON</button>
  </div>

  <div class="game-layout">
    <div class="game-main">
      <h1>NEON STACK</h1>
      <div id="hud">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVEL: <span id="level">1</span></span>
        <span>LINES: <span id="lines">0</span></span>
      </div>
      <div id="canvas-wrapper">
        <canvas id="canvas" width="700" height="520"></canvas>
        <div id="overlay">
          <h2>NEON STACK</h2>
          <p>
            Arrow keys / WASD — Move &amp; Rotate<br>
            Up / W — Rotate<br>
            Down / S — Soft drop<br>
            Space — Hard drop<br>
            C — Hold piece
          </p>
          <div id="difficulty-selector">
            <button class="diff-btn" data-difficulty="easy">Easy</button>
            <button class="diff-btn" data-difficulty="normal">Normal</button>
            <button class="diff-btn" data-difficulty="hard">Hard</button>
          </div>
          <button id="start-btn">START GAME</button>
        </div>
      </div>
      <div class="touch-controls" id="touch-controls">
        <div class="touch-controls-row">
          <button class="dpad-btn" data-key="ArrowLeft" style="width:72px;height:72px;font-size:1.8rem;">&#9664;</button>
          <button class="dpad-btn" data-key="ArrowDown" style="width:72px;height:72px;font-size:1.8rem;">&#9660;</button>
          <button class="dpad-btn" data-key="ArrowRight" style="width:72px;height:72px;font-size:1.8rem;">&#9654;</button>
        </div>
        <div class="touch-controls-row" style="margin-top:8px;">
          <button class="touch-btn-fire" id="rotate-btn">ROTATE</button>
          <button class="touch-btn-fire" id="drop-btn">DROP</button>
        </div>
        <div class="touch-hint">D-PAD TO MOVE &bull; ROTATE &bull; DROP</div>
      </div>
    </div>

    <div class="game-leaderboard">
      <h3>TOP SCORES</h3>
      <ul class="lb-list" id="lb-list">
        <li class="lb-empty">Loading...</li>
      </ul>
    </div>
  </div>

  <script src="/js/sfx.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script>
    // Touch controls — movement buttons
    document.querySelectorAll('.dpad-btn[data-key]').forEach(btn => {
      let interval = null;
      const startMove = (e) => {
        e.preventDefault();
        document.dispatchEvent(new KeyboardEvent('keydown', { key: btn.dataset.key, bubbles: true }));
        interval = setInterval(() => {
          document.dispatchEvent(new KeyboardEvent('keydown', { key: btn.dataset.key, bubbles: true }));
        }, 80);
      };
      const stopMove = (e) => {
        e.preventDefault();
        clearInterval(interval);
        document.dispatchEvent(new KeyboardEvent('keyup', { key: btn.dataset.key, bubbles: true }));
      };
      btn.addEventListener('touchstart', startMove, { passive: false });
      btn.addEventListener('touchend', stopMove, { passive: false });
      btn.addEventListener('touchcancel', stopMove, { passive: false });
    });

    // Rotate button
    const rotateBtn = document.getElementById('rotate-btn');
    if (rotateBtn) {
      rotateBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        document.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowUp', bubbles: true }));
      }, { passive: false });
      rotateBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        document.dispatchEvent(new KeyboardEvent('keyup', { key: 'ArrowUp', bubbles: true }));
      }, { passive: false });
    }

    // Drop button
    const dropBtn = document.getElementById('drop-btn');
    if (dropBtn) {
      dropBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        document.dispatchEvent(new KeyboardEvent('keydown', { key: ' ', code: 'Space', bubbles: true }));
      }, { passive: false });
      dropBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        document.dispatchEvent(new KeyboardEvent('keyup', { key: ' ', code: 'Space', bubbles: true }));
      }, { passive: false });
    }

    async function loadMiniLeaderboard() {
      const list = document.getElementById('lb-list');
      if (!list) return;
      try {
        const res = await api.get('/api/scores/tetris');
        if (!res || !res.ok) throw new Error('fetch failed');
        const scores = await res.json();
        const user = await api.getUser();

        if (scores.length === 0) {
          list.innerHTML = '<li class="lb-empty">No scores yet</li>';
          return;
        }

        list.innerHTML = '';
        for (const s of scores) {
          const isSelf = user && s.username === user.username;
          const li = document.createElement('li');
          if (isSelf) li.style.color = 'var(--neon-gold)';
          const rankSpan = document.createElement('span');
          rankSpan.className = 'lb-rank';
          rankSpan.textContent = '#' + s.rank;
          const nameSpan = document.createElement('span');
          nameSpan.className = 'lb-name';
          nameSpan.textContent = isSelf ? s.username + ' (YOU)' : s.username;
          const scoreSpan = document.createElement('span');
          scoreSpan.className = 'lb-score';
          scoreSpan.textContent = s.score.toLocaleString();
          li.append(rankSpan, nameSpan, scoreSpan);

          // Show difficulty tag
          if (s.difficulty && s.difficulty !== 'normal') {
            const diffSpan = document.createElement('span');
            diffSpan.className = 'lb-diff lb-diff-' + s.difficulty;
            diffSpan.textContent = s.difficulty === 'easy' ? 'E' : 'H';
            li.appendChild(diffSpan);
          }

          list.appendChild(li);
        }
      } catch (err) {
        console.error('Mini-leaderboard load failed:', err);
        list.innerHTML = '<li class="lb-empty">Failed to load</li>';
      }
    }
    window.loadMiniLeaderboard = loadMiniLeaderboard;

    document.addEventListener('DOMContentLoaded', () => {
      const logoutBtn = document.getElementById('nav-logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
          e.preventDefault();
          api.logout();
        });
      }
      loadMiniLeaderboard();

      const soundBtn = document.getElementById('sound-toggle');
      const themeBtn = document.getElementById('theme-toggle');
      if (soundBtn) {
        soundBtn.textContent = 'SFX: ' + (sfx.enabled ? 'ON' : 'OFF');
        soundBtn.classList.toggle('active', sfx.enabled);
        soundBtn.addEventListener('click', () => {
          const on = sfx.toggle();
          soundBtn.textContent = 'SFX: ' + (on ? 'ON' : 'OFF');
          soundBtn.classList.toggle('active', on);
        });
      }
      if (themeBtn) {
        themeBtn.textContent = 'THEME: ' + (arcadeTheme.current === 'kids' ? 'KIDS' : 'NEON');
        themeBtn.classList.toggle('active', arcadeTheme.isKids);
        themeBtn.addEventListener('click', () => {
          const t = arcadeTheme.toggle();
          themeBtn.textContent = 'THEME: ' + (t === 'kids' ? 'KIDS' : 'NEON');
          themeBtn.classList.toggle('active', arcadeTheme.isKids);
        });
      }
    });
  </script>
  <script src="game.js"></script>
</body>
</html>
