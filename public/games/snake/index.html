<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Neon Growth — Retro Arcade</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .game-layout {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      flex-wrap: wrap;
    }
    .game-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      max-width: 100%;
      overflow: hidden;
    }
    .game-main h1 {
      font-size: 1.5rem;
      letter-spacing: 0.3em;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      margin-bottom: 0.5rem;
      color: #0ff;
      word-break: break-word;
      overflow-wrap: break-word;
      text-align: center;
    }
    #hud {
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 6px #0ff;
      color: #0ff;
      flex-wrap: wrap;
      justify-content: center;
    }
    #canvas-wrapper { position: relative; max-width: 100%; }
    canvas {
      display: block;
      border: 2px solid #0ff;
      box-shadow: 0 0 20px #0ff, 0 0 40px #0080ff;
      max-width: 100%;
      height: auto;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      color: #0ff;
      gap: 1rem;
    }
    #overlay h2 {
      font-size: 2rem;
      text-shadow: 0 0 10px #0ff;
      letter-spacing: 0.2em;
      font-family: var(--font-pixel);
      word-break: break-word;
      overflow-wrap: break-word;
      text-align: center;
      max-width: 90%;
    }
    #overlay p { font-size: 1.1rem; opacity: 0.85; }
    #overlay button {
      background: transparent;
      border: 2px solid #0ff;
      color: #0ff;
      font-family: inherit;
      font-size: 1.1rem;
      padding: 0.5rem 2rem;
      cursor: pointer;
      text-shadow: 0 0 6px #0ff;
      box-shadow: 0 0 10px #0ff;
      letter-spacing: 0.1em;
    }
    #overlay button:hover { background: rgba(0,255,255,0.1); }
    #legend {
      display: flex;
      gap: 1.5rem;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      opacity: 0.7;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 100%;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 2px;
      display: inline-block;
    }

    /* Leaderboard panel */
    .game-leaderboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      min-width: 220px;
      max-width: 280px;
    }
    .game-leaderboard h3 {
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      color: var(--neon-gold);
      text-shadow: 0 0 6px rgba(255,215,0,0.4);
      margin-bottom: 12px;
      text-align: center;
    }
    .lb-list { list-style: none; font-size: 0.8rem; }
    .lb-list li {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .lb-list li:last-child { border-bottom: none; }
    .lb-rank { color: var(--neon-cyan); min-width: 28px; }
    .lb-name { flex: 1; margin: 0 8px; }
    .lb-score { color: var(--neon-green); font-family: var(--font-mono); }
    .lb-empty { color: #555; font-size: 0.75rem; text-align: center; padding: 12px 0; }

    @media (max-width: 900px) {
      .game-layout { flex-direction: column; align-items: center; }
      .game-leaderboard { max-width: 100%; min-width: 280px; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">RETRO ARCADE</a>
    <div class="navbar-links">
      <a href="/leaderboard.html">Leaderboard</a>
      <span id="nav-auth-links" style="display:flex;gap:20px;">
        <a href="/auth/login.html">Login</a>
        <a href="/auth/register.html">Register</a>
      </span>
      <span id="nav-user-info" style="display:none;align-items:center;gap:12px;">
        <span class="navbar-user" id="nav-username"></span>
        <a href="#" id="nav-logout-btn">Logout</a>
      </span>
    </div>
  </nav>

  <div class="game-layout">
    <div class="game-main">
      <h1>NEON GROWTH</h1>
      <div id="hud">
        <span>SCORE: <span id="score">0</span></span>
        <span>BEST: <span id="high-score">0</span></span>
        <span>SEGMENTS: <span id="segments">1</span></span>
      </div>
      <div id="canvas-wrapper">
        <canvas id="canvas" width="620" height="620"></canvas>
        <div id="overlay">
          <h2>NEON GROWTH</h2>
          <p>Arrow keys, WASD, or swipe to move</p>
          <button id="start-btn">START GAME</button>
        </div>
      </div>
      <div id="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#ffd700;box-shadow:0 0 4px #ffd700;"></div> Gold Apple +50pts (5 seg)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c0c0c0;box-shadow:0 0 4px #c0c0c0;border-radius:50%"></div> Silver Circle +25pts (2 seg, speed)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00cfff;box-shadow:0 0 4px #00cfff;"></div> Diamond +200pts (10 seg)</div>
      </div>
      <div class="touch-controls" id="touch-controls">
        <div class="dpad">
          <div class="dpad-btn dpad-btn--blank"></div>
          <button class="dpad-btn" data-key="ArrowUp">&#9650;</button>
          <div class="dpad-btn dpad-btn--blank"></div>
          <button class="dpad-btn" data-key="ArrowLeft">&#9664;</button>
          <div class="dpad-btn dpad-btn--blank"></div>
          <button class="dpad-btn" data-key="ArrowRight">&#9654;</button>
          <div class="dpad-btn dpad-btn--blank"></div>
          <button class="dpad-btn" data-key="ArrowDown">&#9660;</button>
          <div class="dpad-btn dpad-btn--blank"></div>
        </div>
        <div class="touch-hint">SWIPE OR TAP TO MOVE</div>
      </div>
    </div>

    <div class="game-leaderboard">
      <h3>TOP SCORES</h3>
      <ul class="lb-list" id="lb-list">
        <li class="lb-empty">Loading...</li>
      </ul>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // D-pad touch controls
    document.querySelectorAll('.dpad-btn[data-key]').forEach(btn => {
      const fire = (e) => {
        e.preventDefault();
        document.dispatchEvent(new KeyboardEvent('keydown', { key: btn.dataset.key, bubbles: true }));
      };
      btn.addEventListener('touchstart', fire, { passive: false });
      btn.addEventListener('mousedown', fire);
    });

    async function loadMiniLeaderboard() {
      const list = document.getElementById('lb-list');
      if (!list) return;
      try {
        const res = await api.get('/api/scores/neon-growth');
        if (!res || !res.ok) throw new Error('fetch failed');
        const scores = await res.json();
        const user = await api.getUser();

        if (scores.length === 0) {
          list.innerHTML = '<li class="lb-empty">No scores yet</li>';
          return;
        }

        list.innerHTML = '';
        for (const s of scores) {
          const isSelf = user && s.username === user.username;
          const li = document.createElement('li');
          if (isSelf) li.style.color = 'var(--neon-gold)';
          const rankSpan = document.createElement('span');
          rankSpan.className = 'lb-rank';
          rankSpan.textContent = '#' + s.rank;
          const nameSpan = document.createElement('span');
          nameSpan.className = 'lb-name';
          nameSpan.textContent = isSelf ? s.username + ' (YOU)' : s.username;
          const scoreSpan = document.createElement('span');
          scoreSpan.className = 'lb-score';
          scoreSpan.textContent = s.score.toLocaleString();
          li.append(rankSpan, nameSpan, scoreSpan);
          list.appendChild(li);
        }
      } catch (err) {
        console.error('Mini-leaderboard load failed:', err);
        list.innerHTML = '<li class="lb-empty">Failed to load</li>';
      }
    }
    window.loadMiniLeaderboard = loadMiniLeaderboard;

    document.addEventListener('DOMContentLoaded', () => {
      const logoutBtn = document.getElementById('nav-logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
          e.preventDefault();
          api.logout();
        });
      }
      loadMiniLeaderboard();
    });
  </script>
  <script src="game.js" type="module"></script>
</body>
</html>
